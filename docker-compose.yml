version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./weights:/app/weights          # mount trained model weights
      - ./output:/app/output            # persist violation logs & snapshots
      - ./data:/app/data                # optional: test videos/images
    environment:
      - MODEL_PATH=/app/weights/best.pt
      - OUTPUT_DIR=/app/output
      - LOG_LEVEL=INFO
      - DEVICE=cuda                     # change to "cpu" if no GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
